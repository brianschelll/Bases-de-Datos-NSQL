<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turismo Geo Redis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow text-center" style="max-width: 600px;">
        <h2 class="mb-4">Buscador Turístico (A 5km)</h2>
        
        <p class="text-muted">Tu ubicación actual: Plaza San Martín (Lat: -32.4815, Lon: -58.2325)</p>
        
        <select id="grupoSelect" class="form-select mb-3">
            <option value="universidades">Universidades</option>
            <option value="cervecerias">Cervecerías Artesanales</option>
            <option value="farmacias">Farmacias</option>
            <option value="emergencias">Centros de Emergencia</option>
            <option value="supermercados">Supermercados</option>
        </select>

        <button onclick="buscarCercanos()" class="btn btn-primary w-100">Buscar Lugares Cercanos</button>

        <div id="resultados" class="mt-4 text-start"></div>
    </div>

    <script>
        async function buscarCercanos() {
            const grupo = document.getElementById('grupoSelect').value;
            const lat = -32.4815;
            const lon = -58.2325;
            const divResultados = document.getElementById('resultados');
            
            divResultados.innerHTML = "<p>Buscando...</p>";

            try {
                // Le pegamos a nuestra API en Python
                const response = await fetch(`http://localhost:3000/api/lugares/cercanos?latitud=${lat}&longitud=${lon}&grupo=${grupo}&radio_km=5`);
                const data = await response.json();

                if(data.resultados.length === 0) {
                    divResultados.innerHTML = `<div class="alert alert-warning">No se encontraron lugares en el grupo "${grupo}" a menos de 5km.</div>`;
                    return;
                }

                let html = "<ul class='list-group'>";
                data.resultados.forEach(lugar => {
                    html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                                ${lugar.nombre}
                                <span class="badge bg-success rounded-pill">${lugar.distancia_km} km</span>
                             </li>`;
                });
                html += "</ul>";
                divResultados.innerHTML = html;

            } catch (error) {
                divResultados.innerHTML = `<div class="alert alert-danger">Error conectando con la API</div>`;
            }
        }
    </script>
</body>
</html>

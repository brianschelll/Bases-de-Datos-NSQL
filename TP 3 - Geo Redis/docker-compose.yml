version: '3.8'

services:
  
  redis-db:
    image: redis:alpine
    container_name: redis_turismo
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # Para que no se borren los lugares si apagas el contenedor

  
  backend:
    build: ./backend  
    container_name: backend_api
    ports:
      - "3000:3000"   
    depends_on:
      - redis-db      
    environment:
      - REDIS_HOST=redis-db
      - REDIS_PORT=6379

  
  frontend:
    build: ./frontend 
    container_name: frontend_web
    ports:
      - "8080:80"     
    depends_on:
      - backend

volumes:
  redis_data:
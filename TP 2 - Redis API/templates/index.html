<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mando-Rent NoSQL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        
        body { 
            background-color: #0f1115; 
            color: #f8f9fa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-title {
            color: #ffc107;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
            margin: 30px 0;
        }

        
        .card { 
            background-color: #1a1d22; 
            border-radius: 10px;
            border: 2px solid #2d3238;
            transition: 0.2s;
            min-height: 150px; 
        }

        
        .disponible { border-color: #19875466; box-shadow: 0 4px 10px rgba(25, 135, 84, 0.1); }
        .reservado { border-color: #ffc10766; box-shadow: 0 4px 10px rgba(255, 193, 7, 0.1); }
        .alquilado { border-color: #dc354566; box-shadow: 0 4px 10px rgba(220, 53, 69, 0.1); }

        .card:hover {
            transform: scale(1.03);
            background-color: #21252b;
        }

        .btn-sm {
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .cap-titulo {
            font-size: 0.95rem;
            color: #e9ecef;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="text-center main-title">THE MANDALORIAN RENTALS</h1>
        
        <div id="grid-capitulos" class="row g-3">
            </div>
    </div>

    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/capitulos');
                const data = await res.json();
                const grid = document.getElementById('grid-capitulos');
                grid.innerHTML = '';

                data.forEach(c => {
                    const col = document.createElement('div');
                    col.className = 'col-6 col-md-4 col-lg-3'; 
                    
                    let btn = '';
                    if(c.estado === 'Disponible') {
                        btn = `<button onclick="accion(${c.id}, 'reservar')" class="btn btn-sm btn-outline-success w-100">Reservar</button>`;
                    } else if(c.estado === 'Reservado') {
                        btn = `<button onclick="accion(${c.id}, 'confirmar')" class="btn btn-sm btn-warning w-100 text-dark">Pagar $500</button>`;
                    } else {
                        btn = `<button class="btn btn-sm btn-outline-secondary w-100" disabled>Alquilado</button>`;
                    }

                    col.innerHTML = `
                        <div class="card h-100 ${c.estado.toLowerCase()} p-2">
                            <div class="card-body d-flex flex-column justify-content-between text-center p-2">
                                <h6 class="cap-titulo fw-bold">${c.nombre}</h6>
                                <div>
                                    <p class="small text-muted mb-2">Estado: <span class="text-light">${c.estado}</span></p>
                                    ${btn}
                                </div>
                            </div>
                        </div>`;
                    grid.appendChild(col);
                });
            } catch (err) { console.error(err); }
        }

        async function accion(id, tipo) {
            const url = tipo === 'confirmar' ? `/api/confirmar/${id}?precio=500` : `/api/reservar/${id}`;
            await fetch(url, { method: 'POST' });
            cargar();
        }

        cargar();
        setInterval(cargar, 5000);
    </script>
</body>
</html>
